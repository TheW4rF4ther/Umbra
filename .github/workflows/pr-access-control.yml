name: PR Access Control

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  enforce-access-control:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR is from authorized contributor
        run: |
          if [[ "${{ github.event.pull_request.user.login }}" != "TheW4rF4ther" ]]; then
            echo "❌ Pull requests from external contributors are not accepted."
            exit 1
          fi
      
      - name: Reject unauthorized PR
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'CLOSE'
            });
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🔒 **This repository does not accept external pull requests.** Only authorized team members may contribute. This PR has been closed.'
            });
